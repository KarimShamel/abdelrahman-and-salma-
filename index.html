<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salma & Abdelrahman | Engagement Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --terracotta:#C96A4B;
    --burnt:#A84F3A;
    --peach:#F6B089;
    --coral:#F28C79;
    --gold:#E6B45A;
    --rose:#A65E6C;
    --cream:#FFF7F2;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    overflow-x:hidden;
    background:
    radial-gradient(circle at top left, rgba(246,176,137,.25), transparent 35%),
    radial-gradient(circle at bottom right, rgba(166,94,108,.20), transparent 35%),
    linear-gradient(135deg,#fff8f4,#ffe7da);
    font-family:'Montserrat',sans-serif;
    color:#4d3d38;
}

/* ===================================================
   OPENING CURTAIN
=================================================== */

#curtainContainer{
    position:fixed;
    inset:0;
    z-index:999999;
    display:flex;
    cursor:pointer;
    overflow:hidden;
}

.curtain-left,
.curtain-right{
    width:50%;
    height:100%;
    position:relative;
    transition:2s ease;

    background:
    linear-gradient(
    90deg,
    #8b3f2d,
    #c96a4b,
    #e6b45a,
    #c96a4b,
    #8b3f2d);
}

.curtain-left::before,
.curtain-right::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
    90deg,
    rgba(255,255,255,.18) 0,
    rgba(255,255,255,.18) 12px,
    transparent 12px,
    transparent 28px);
}

.curtain-center{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.curtain-content{
    text-align:center;
    color:white;
}

.curtain-content h2{
    font-family:'Playfair Display',serif;
    font-size:clamp(2.5rem,6vw,5rem);
}

.curtain-content p{
    margin-top:15px;
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:.85rem;
}

.curtain-open .curtain-left{
    transform:translateX(-100%);
}

.curtain-open .curtain-right{
    transform:translateX(100%);
}

@keyframes floatBow{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* ===================================================
   FLOATING BOWS
=================================================== */

#bows{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
}

.bow{
    position:absolute;
    color:rgba(201,106,75,.13);
    animation:rise linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(120vh) rotate(0deg);
    }
    to{
        transform:translateY(-150px) rotate(360deg);
    }
}

/* ===================================================
   HERO
=================================================== */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    position:relative;
    z-index:2;
}

.hero-content{
    max-width:900px;
}

.tag{
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--rose);
    margin-bottom:20px;
}

.names{
    font-family:'Playfair Display',serif;
    font-size:clamp(3.5rem,8vw,6rem);
    color:var(--burnt);
    line-height:1.1;
}

.subtitle{
    margin-top:25px;
    color:var(--rose);
    font-size:1.1rem;
}

.divider{
    margin:30px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
}

.divider span{
    width:90px;
    height:2px;
    background:linear-gradient(to right,var(--peach),var(--gold));
}

/* ===================================================
   COUNTDOWN
=================================================== */

.countdown{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.time-box{
    background:rgba(255,255,255,.8);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.time-box h3{
    font-size:2rem;
    color:var(--burnt);
}

.time-box p{
    color:var(--rose);
    margin-top:5px;
}

/* ===================================================
   SECTIONS
=================================================== */

section{
    padding:90px 20px;
    position:relative;
    z-index:2;
}

.container{
    max-width:1100px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:50px;
}

.title h2{
    font-family:'Playfair Display',serif;
    color:var(--burnt);
    font-size:3rem;
}

.card{
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(12px);
    border-radius:35px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.details{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    text-align:center;
}

.details h3{
    color:var(--burnt);
    margin-bottom:10px;
}

.map-btn{
    display:inline-block;
    margin-top:40px;
    text-decoration:none;
    padding:16px 35px;
    border-radius:50px;
    color:white;
    font-weight:600;

    background:
    linear-gradient(
    135deg,
    var(--terracotta),
    var(--rose));

    transition:.3s;
}

.map-btn:hover{
    transform:translateY(-4px);
}

/* ===================================================
   VIDEO
=================================================== */

.video-container{
    position:relative;
    border-radius:30px;
    overflow:hidden;
}

video{
    width:100%;
    display:block;
    background:black;
}

.play-overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.25);
    cursor:pointer;
}

.play-btn{
    width:90px;
    height:90px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    color:var(--burnt);
}

.hidden{
    opacity:0;
    pointer-events:none;
}

/* ===================================================
   ANIMATION
=================================================== */

.reveal{
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}

.reveal.active{
    opacity:1;
    transform:translateY(0);
}

@media(max-width:768px){

    .countdown{
        grid-template-columns:repeat(2,1fr);
    }

    .title h2{
        font-size:2.2rem;
    }

    .card{
        padding:25px;
    }
}

</style>
</head>
<body>

<!-- CURTAIN -->

<div id="curtainContainer">

    <div class="curtain-left"></div>

    <div class="curtain-center">

        <div class="curtain-content">

            <div class="curtain-bow"></div>

            <h2></h2>

            <p></p>

        </div>

    </div>

    <div class="curtain-right"></div>

</div>

<!-- FLOATING BOWS -->

<div id="bows"></div>

<!-- HERO -->

<section class="hero">

    <div class="hero-content">

        <div class="tag">Engagement Invitation</div>

        <h1 class="names">
            Salma<br>
            &<br>
            Abdelrahman
        </h1>

        <div class="divider">
            <span></span>
            🎀
            <span></span>
        </div>

        <p class="subtitle">
            Join us as we celebrate love, joy and a beautiful new beginning.
        </p>

        <div class="countdown">

            <div class="time-box">
                <h3 id="days">00</h3>
                <p>Days</p>
            </div>

            <div class="time-box">
                <h3 id="hours">00</h3>
                <p>Hours</p>
            </div>

            <div class="time-box">
                <h3 id="minutes">00</h3>
                <p>Minutes</p>
            </div>

            <div class="time-box">
                <h3 id="seconds">00</h3>
                <p>Seconds</p>
            </div>

        </div>

    </div>

</section>

<!-- DETAILS -->

<section class="reveal">

    <div class="container">

        <div class="title">
            <h2>Event Details</h2>
        </div>

        <div class="card">

            <div class="details">

                <div>
                    <h3>📅 Date</h3>
                    <p>17 July 2026</p>
                </div>

                <div>
                    <h3>💍 Event</h3>
                    <p>Engagement Celebration</p>
                </div>

                <div>
                    <h3>📍 Venue</h3>
                    <p>Zoya Azha, New Cairo</p>
                </div>

            </div>

            <div style="text-align:center;">
                <a class="map-btn"
                   target="_blank"
                   href="https://maps.app.goo.gl/RDZgBoio24uBomGh8?g_st=iwb">
                   View Location
                </a>
            </div>

        </div>

    </div>

</section>

<!-- VIDEO -->

<section class="reveal">

    <div class="container">

        <div class="title">
            <h2>Directions Video</h2>
        </div>

        <div class="card">

            <div class="video-container">

                <!-- Replace with your video -->
                <video id="video">
                    <source src="salma.mp4" type="video/mp4">
                </video>

                <div class="play-overlay" id="overlay">
                    <div class="play-btn">▶</div>
                </div>

            </div>

        </div>

    </div>

</section>

<script>

/* CURTAIN */

const curtain = document.getElementById("curtainContainer");

curtain.addEventListener("click",()=>{

    curtain.classList.add("curtain-open");

    setTimeout(()=>{

        curtain.style.opacity="0";
        curtain.style.transition="1s";

        setTimeout(()=>{
            curtain.remove();
        },1000);

    },2000);

});

/* COUNTDOWN */

const targetDate =
new Date("July 17, 2026 19:00:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();

    const distance = targetDate - now;

    const days =
    Math.floor(distance/(1000*60*60*24));

    const hours =
    Math.floor((distance%(1000*60*60*24))
    /(1000*60*60));

    const minutes =
    Math.floor((distance%(1000*60*60))
    /(1000*60));

    const seconds =
    Math.floor((distance%(1000*60))
    /1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);

/* FLOATING BOWS */

const bows = document.getElementById("bows");

for(let i=0;i<35;i++){

    const bow = document.createElement("div");

    bow.classList.add("bow");

    bow.innerHTML = "🎀";

    bow.style.left=Math.random()*100+"%";

    bow.style.fontSize=
    (15+Math.random()*25)+"px";

    bow.style.animationDuration=
    (15+Math.random()*20)+"s";

    bow.style.animationDelay=
    Math.random()*10+"s";

    bows.appendChild(bow);
}

/* REVEAL */

const reveals =
document.querySelectorAll(".reveal");

window.addEventListener("scroll",()=>{

    reveals.forEach(el=>{

        if(
            el.getBoundingClientRect().top
            <
            window.innerHeight-100
        ){
            el.classList.add("active");
        }

    });

});

/* VIDEO */

const video=document.getElementById("video");
const overlay=document.getElementById("overlay");

overlay.addEventListener("click",()=>{

    video.play();
    overlay.classList.add("hidden");

});

video.addEventListener("pause",()=>{
    overlay.classList.remove("hidden");
});

video.addEventListener("ended",()=>{
    overlay.classList.remove("hidden");
});

</script>

</body>
</html>
